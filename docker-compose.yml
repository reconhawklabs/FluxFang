services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Creates the application database on first init (matches the DB name in
      # DATABASE_URL). The postgis image enables the PostGIS extension in it.
      # NOTE: only takes effect on an empty data volume — if you change it, run
      # `docker compose down -v` to re-init (this WIPES existing data).
      POSTGRES_DB: ${POSTGRES_DB:-fluxfang}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    # Host networking is required so the backend can capture raw wifi/gps
    # traffic on host network interfaces, and so it can reach Postgres at
    # 127.0.0.1:5432 (the `db` service's published port) without relying on
    # Docker's bridge DNS.
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      DATABASE_URL: ${DATABASE_URL}
      FLUXFANG_SESSION_KEY: ${FLUXFANG_SESSION_KEY}
      FLUXFANG_SECRET_KEY: ${FLUXFANG_SECRET_KEY}
      WIFI_DEVICE: ${WIFI_DEVICE:-}
      GPS_DEVICE: ${GPS_DEVICE:-}
      # Bluetooth Scanning mode talks to org.bluez over the host's *system*
      # D-Bus (see the volume mount below). Point zbus at the mounted socket
      # explicitly so it never falls back to a non-existent in-container bus.
      DBUS_SYSTEM_BUS_ADDRESS: unix:path=/run/dbus/system_bus_socket
    # --- Hardware passthrough ---
    # WiFi adapter: NOT listed under `devices:` below. A wifi NIC is a network
    # interface, not a /dev character device -- with `network_mode: host` +
    # `privileged: true` + `NET_ADMIN`/`NET_RAW` above, the backend already
    # sees every host network interface by name (e.g. `iw dev wlan1 ...`).
    # WIFI_DEVICE (env var only, no passthrough needed) just tells the backend
    # which interface name to drive into monitor mode.
    #
    # GPS receiver: if it's a network gpsd server, same story -- host
    # networking reaches `host:port` directly, no passthrough needed. If it's
    # a USB/serial GPS dongle instead, the backend needs the character device
    # node passed through explicitly via `--device` (Compose `devices:`).
    # Default both sides to /dev/null (always present, harmless no-op) so
    # `docker compose up` still comes up cleanly with no GPS hardware
    # attached; set GPS_DEVICE=/dev/ttyUSB0 (or similar) in `.env` to pass
    # through a real serial device.
    devices:
      - "${GPS_DEVICE:-/dev/null}:${GPS_DEVICE:-/dev/null}"
    # Bluetooth adapter: an HCI radio is reached over the host's system D-Bus
    # (org.bluez), not a /dev node. `network_mode: host` + `privileged` already
    # let the container see the adapter under /sys/class/bluetooth; this mount
    # gives it the host's *system* bus socket so the BlueZ Scanning capturer's
    # `zbus::Connection::system()` can drive discovery. Requires bluetoothd
    # running on the HOST with the adapter powered (`bluetoothctl power on`).
    # Harmless when no Bluetooth data source is configured.
    #
    # USB hotplug (RTL-SDR, USB-serial GPS): bind-mount the host's live USB
    # device tree. `privileged: true` grants device-cgroup *permission* to all
    # devices, but the container's /dev is a private tmpfs snapshot taken at
    # container start -- it does NOT receive host udev hotplug events. So when
    # an RTL-SDR is unplugged/replugged the host re-enumerates it to a new
    # /dev/bus/usb/<bus>/<dev> node that the container never sees, leaving a
    # stale node; rtl_test/rtl_433 then open the wrong node and fail
    # ("usb_open error", "No RTL-SDR device found") until the container is
    # restarted. Bind-mounting /dev/bus/usb shares the host's devtmpfs subtree
    # so newly-enumerated nodes appear live in the container, letting the 10s
    # capture reconciler auto-recover a replugged dongle without a restart.
    # (Supersedes the "privileged already covers /dev" note in
    # docs/superpowers/specs/2026-07-07-rtl-sdr-tpms-datasource-design.md.)
    volumes:
      - "/run/dbus/system_bus_socket:/run/dbus/system_bus_socket"
      - "/dev/bus/usb:/dev/bus/usb"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    # Same reasoning as backend: host networking lets nginx proxy /api and /ws
    # to the backend at 127.0.0.1:8080 without depending on Docker DNS.
    network_mode: host
    depends_on:
      - backend

volumes:
  postgres_data:
