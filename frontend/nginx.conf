server {
    # The frontend container runs with network_mode: host (see docker-compose.yml)
    # so it can reach the backend, which also runs on host networking, via
    # 127.0.0.1. Listening on 8081 (rather than 80) avoids colliding with
    # anything else already bound to port 80 on the host.
    listen 8081;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Stopping a wifi monitor source is a hardware teardown: it joins the
        # capture and channel-hopper threads, then shells out to `ip`/`iw` to
        # restore managed mode, which on some drivers takes far longer than
        # nginx's default 60s read timeout. A 504 mid-teardown used to leave
        # the source's row stuck at "running" (the backend is now resilient to
        # that -- see `CaptureSupervisor::stop` -- but the request should not
        # be failing in the first place).
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        # Long-lived live-stream websockets outlive nginx's default 60s
        # read/send timeout; keep them open indefinitely-ish.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
