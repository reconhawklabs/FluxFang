server {
    # The frontend container runs with network_mode: host (see docker-compose.yml)
    # so it can reach the backend, which also runs on host networking, via
    # 127.0.0.1. Listening on 8081 (rather than 80) avoids colliding with
    # anything else already bound to port 80 on the host.
    listen 8081;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        # Long-lived live-stream websockets outlive nginx's default 60s
        # read/send timeout; keep them open indefinitely-ish.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
